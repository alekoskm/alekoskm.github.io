<!DOCTYPE html>

  ΟΔΗΓΙΕΣ:
  1. Αντιγράψε αυτό το αρχείο και μετονόμασέ το, π.χ. works/silence.html

<!-- HERO: ../[όνομα]/top.jpg -->

    <h1>
      [ΤΙΤΛΟΣ]
      <span class="greek">[ΕΛΛΗΝΙΚΟΣ ΤΙΤΛΟΣ — προαιρετικό]</span>
    </h1>
  </div>
</section>

<div class="work-detail__body">

  <!-- Σύντομη πρόταση που συμπυκνώνει το έργο -->
  <p class="work-pullquote work-pullquote--opening">

    </p>
    <p>
      [ΠΑΡΑΓΡΑΦΟΣ 2 — προαιρετικό]
    </p>
  </div>

  <!-- Festival / Presented at — σβήσε όλο το block αν δεν χρειάζεται -->
  <div class="work-festival">
    <span class="label">Presented at</span>
    <span class="value">[ΟΝΟΜΑ ΦΕΣΤΙΒΑΛ/ΧΩΡΟΥ — ΠΟΛΗ, ΕΤΟΣ]</span>
  </div>

    <figure>
      <img src="../[όνομα]/01.jpg" alt="[ΤΙΤΛΟΣ] — scene 1" onerror="this.style.display='none'">

    <figure>

    <div class="work-video__placeholder">
      <span class="label">Video</span>
      <span class="hint">Vimeo or YouTube embed — see comment in HTML</span>

    <iframe
