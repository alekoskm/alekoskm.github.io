<section>
  <!-- ════════════════════════════════════════════════
       GALLERY CATEGORIES
       ════════════════════════════════════════════════
       Κάθε category → ένα <a class="gallery-card"> που οδηγεί σε δικό του html.
       Φτιάξε ένα νέο αρχείο gallery/[όνομα].html (αντιγραφή του gallery/_template.html)
       και ανέβασε τις εικόνες στο /images/.
  -->
  <div class="gallery-grid">

    <!-- ════════ Street food fight ════════ -->
    <a href="gallery/street-food-fight.html" class="gallery-card">
      <img src="images/IMG_6350.jpg" alt="Street food fight" onerror="this.style.display='none'">
      <div class="gallery-card__overlay">
        <div class="gallery-card__meta">Series</div>
        <div class="gallery-card__title">Street food fight</div>
      </div>
    </a>

    <!-- Placeholder για επόμενη κατηγορία -->

      <div class="gallery-card__overlay">
        <div class="gallery-card__meta">Coming</div>
        <div class="gallery-card__title">Next series</div>
      </div>
    </div>

  </div>
